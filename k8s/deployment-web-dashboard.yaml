apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-dashboard
  namespace: energy-monitoring
  labels:
    app: web-dashboard
    component: visualization
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-dashboard
  template:
    metadata:
      labels:
        app: web-dashboard
        component: visualization
    spec:
      containers:
      - name: web-dashboard
        image: energy-monitoring/web-dashboard:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8501
          name: http
        env:
        - name: DATABASE_URL
          value: "postgresql://postgres:$(POSTGRES_PASSWORD)@timescaledb.energy-monitoring.svc.cluster.local:5432/energy"
        - name: STREAMLIT_SERVER_PORT
          value: "8501"
        - name: STREAMLIT_SERVER_ADDRESS
          value: "0.0.0.0"
        - name: STREAMLIT_THEME_BASE
          value: "light"
        - name: STREAMLIT_BROWSER_GATHER_USAGE_STATS
          value: "false"
        - name: REFRESH_INTERVAL_SECONDS
          value: "30"
        - name: LOG_LEVEL
          value: "info"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-secrets
              key: postgres-password
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 8501
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: config
          mountPath: /etc/web-dashboard
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: web-dashboard-config
---
apiVersion: v1
kind: Service
metadata:
  name: web-dashboard
  namespace: energy-monitoring
  labels:
    app: web-dashboard
    component: visualization
spec:
  selector:
    app: web-dashboard
  ports:
  - name: http
    port: 8501
    targetPort: 8501
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-dashboard-ingress
  namespace: energy-monitoring
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
  - host: dashboard.energy-monitoring.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web-dashboard
            port:
              number: 8501
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: web-dashboard-config
  namespace: energy-monitoring
data:
  config.yaml: |
    database:
      host: "timescaledb.energy-monitoring.svc.cluster.local"
      port: 5432
      name: "energy"
      user: "postgres"
      poolSize: 5
      timeout: 10
    
    dashboard:
      title: "Energy Consumption Dashboard"
      refreshInterval: 30
      maxMetersDisplay: 10
      timeRangeOptions:
        - "1 hour"
        - "6 hours"
        - "24 hours"
        - "7 days"
      defaultTimeRange: "1 hour"
    
    charts:
      timeseries:
        height: 500
        showLegend: true
        mode: "lines+markers"
      aggregated:
        height: 600
        subplotRows: 2
        subplotCols: 2
      distribution:
        height: 400
        bins: 50
    
    security:
      enabled: false
      username: "admin"
      passwordHash: ""  # заполнить при необходимости
    
    logging:
      level: "info"
      format: "text"
      file: "/var/log/web-dashboard.log"