apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-collector
  namespace: energy-monitoring
  labels:
    app: go-collector
    component: data-collection
spec:
  replicas: 3
  selector:
    matchLabels:
      app: go-collector
  template:
    metadata:
      labels:
        app: go-collector
        component: data-collection
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: go-collector
        image: energy-monitoring/go-collector:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9090
          name: metrics
        - containerPort: 8815
          name: arrow-flight
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: ETCD_ENDPOINTS
          value: "etcd-cluster.energy-monitoring.svc.cluster.local:2379"
        - name: METER_EMULATOR_URL
          value: "http://meter-emulator.energy-monitoring.svc.cluster.local:8080"
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka.energy-monitoring.svc.cluster.local:9092"
        - name: ARROW_FLIGHT_SERVER_ENABLED
          value: "true"
        - name: ARROW_FLIGHT_SERVER_PORT
          value: "8815"
        - name: WINDOW_SIZE_SECONDS
          value: "30"
        - name: LOG_LEVEL
          value: "info"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: config
          mountPath: /etc/go-collector
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: go-collector-config
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - go-collector
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: go-collector
  namespace: energy-monitoring
  labels:
    app: go-collector
    component: data-collection
spec:
  selector:
    app: go-collector
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  - name: metrics
    port: 9090
    targetPort: 9090
  - name: arrow-flight
    port: 8815
    targetPort: 8815
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: go-collector-hpa
  namespace: energy-monitoring
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: go-collector
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Pods
    pods:
      metric:
        name: kafka_queue_messages
      target:
        type: AverageValue
        averageValue: 1000
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
      - type: Pods
        value: 4
        periodSeconds: 60
      selectPolicy: Max
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: go-collector-config
  namespace: energy-monitoring
data:
  config.yaml: |
    etcd:
      endpoints:
        - "etcd-cluster.energy-monitoring.svc.cluster.local:2379"
      dialTimeout: "5s"
    
    collection:
      meterCount: 100
      pollInterval: "10s"
      timeout: "5s"
    
    aggregation:
      windowSize: "30s"
      windowType: "tumbling"
    
    validation:
      enabled: true
      rustLibraryPath: "/usr/local/lib/libenergy_validation.so"
    
    kafka:
      enabled: true
      bootstrapServers: "kafka.energy-monitoring.svc.cluster.local:9092"
      topics:
        raw: "meter-readings-raw"
        aggregated: "meter-readings-aggregated"
        errors: "meter-readings-validation-errors"
    
    arrow:
      enabled: true
      serverPort: 8815
      flightEnabled: true
    
    metrics:
      enabled: true
      port: 9090
      path: "/metrics"
    
    logging:
      level: "info"
      format: "json"