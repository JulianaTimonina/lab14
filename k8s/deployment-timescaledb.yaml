apiVersion: apps/v1
kind: Deployment
metadata:
  name: timescaledb
  namespace: energy-monitoring
  labels:
    app: timescaledb
    component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: timescaledb
  template:
    metadata:
      labels:
        app: timescaledb
        component: database
    spec:
      containers:
      - name: timescaledb
        image: timescale/timescaledb:latest-pg14
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          value: "energy"
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-secrets
              key: postgres-password
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
            - -h
            - localhost
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
            - -h
            - localhost
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: timescaledb-data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: timescaledb-data
        persistentVolumeClaim:
          claimName: timescaledb-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: timescaledb-pvc
  namespace: energy-monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: timescaledb
  namespace: energy-monitoring
  labels:
    app: timescaledb
    component: database
spec:
  selector:
    app: timescaledb
  ports:
  - port: 5432
    targetPort: 5432
    name: postgres
  type: ClusterIP